name: wireless_mic
description: Wireless microphone app - streams audio over UDP to a Windows receiver.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  permission_handler: ^12.0.1
  flutter_animate: ^4.5.2
  shared_preferences: ^2.5.5
  flutter_foreground_task: 6.1.1
  google_fonts: ^8.1.0
  encrypt: ^5.0.3
  crypto: ^3.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "../windows_client/assets/icon.png"
